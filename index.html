<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PIN Code Finder</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f7f2;
      --bg2: #e6f2ea;
      --surface: #ffffff;
      --surface2: #eef7f1;
      --border: rgba(60,130,80,0.1);
      --border2: rgba(60,130,80,0.2);
      --accent: #2e9e5b;
      --accent2: #3dba6e;
      --accent-glow: rgba(46,158,91,0.22);
      --text: #1a3325;
      --text2: #4e7560;
      --text3: #8aab96;
      --success: #2e9e5b;
      --success-bg: rgba(46,158,91,0.1);
      --orange: #d97b2a;
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 0 1rem 4rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Background grid + glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(46,158,91,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(46,158,91,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 400px;
      background: radial-gradient(ellipse at center, rgba(46,158,91,0.13) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 540px;
    }

    /* Header */
    header {
      text-align: center;
      padding: 4rem 0 2.5rem;
      animation: fadeDown 0.6s ease both;
    }

    .logo-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(46,158,91,0.1);
      border: 1px solid rgba(46,158,91,0.25);
      border-radius: 100px;
      padding: 5px 14px 5px 10px;
      font-size: 11px;
      font-weight: 500;
      color: var(--accent2);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 1.4rem;
    }

    .logo-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 0.6rem;
    }

    h1 span {
      color: var(--accent2);
    }

    .subtitle {
      font-size: 14px;
      color: var(--text2);
      font-weight: 300;
      line-height: 1.6;
    }

    /* Search card */
    .search-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 1.75rem;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.6s 0.1s ease both;
      position: relative;
      overflow: hidden;
    }

    .search-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(46,158,91,0.5), transparent);
    }

    .input-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    .pin-input-wrap {
      flex: 1;
      position: relative;
    }

    .pin-input-wrap .pin-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      font-size: 15px;
      pointer-events: none;
    }

    #pincode {
      width: 100%;
      height: 52px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 1.3rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #pincode::placeholder {
      color: var(--text3);
      letter-spacing: 0.15em;
      font-size: 1rem;
    }

    #pincode:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .search-btn {
      height: 52px;
      padding: 0 22px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .search-btn:hover {
      background: var(--accent2);
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .search-btn:active { transform: scale(0.97); }

    .search-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: var(--text3);
    }

    /* Error */
    .error-msg {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,80,80,0.08);
      border: 1px solid rgba(255,80,80,0.2);
      border-radius: 10px;
      padding: 10px 14px;
      margin-top: 12px;
      font-size: 13px;
      color: #ff7070;
    }

    /* Loader */
    .loader {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 2.5rem;
      font-size: 14px;
      color: var(--text2);
    }

    .spin {
      width: 20px; height: 20px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result card */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 20px;
      overflow: hidden;
      animation: fadeUp 0.4s ease both;
      position: relative;
    }

    .result-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--success), transparent);
    }

    .result-header {
      padding: 1.4rem 1.75rem 1.2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .po-name {
      font-family: 'Syne', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .badge {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 100px;
    }

    .badge-pin {
      background: rgba(46,158,91,0.12);
      color: var(--accent2);
      border: 1px solid rgba(46,158,91,0.25);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
    }

    .badge-type {
      background: rgba(34,211,160,0.1);
      color: var(--success);
      border: 1px solid rgba(34,211,160,0.2);
    }

    .badge-delivery {
      background: rgba(255,140,66,0.1);
      color: var(--orange);
      border: 1px solid rgba(255,140,66,0.2);
    }

    .pin-big {
      font-family: 'DM Mono', monospace;
      font-size: 2rem;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.1em;
      line-height: 1;
      flex-shrink: 0;
    }

    /* Fields */
    .fields {
      padding: 0.25rem 0;
    }

    .field-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.7rem 1.75rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .field-row:last-child { border-bottom: none; }
    .field-row:hover { background: rgba(46,158,91,0.04); }

    .field-key {
      font-size: 12px;
      color: var(--text3);
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .field-icon {
      width: 26px; height: 26px;
      border-radius: 7px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    .field-val {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      text-align: right;
    }

    /* More POs */
    .more-section {
      border-top: 1px solid var(--border);
      padding: 1rem 1.75rem;
    }

    .more-title {
      font-size: 11px;
      font-weight: 500;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .po-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 11px;
      font-size: 12px;
      color: var(--text2);
      margin: 3px;
      transition: border-color 0.15s, color 0.15s;
    }

    .po-chip:hover { border-color: var(--border2); color: var(--text); }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Footer */
    footer {
      margin-top: 2.5rem;
      text-align: center;
      font-size: 12px;
      color: var(--text3);
      animation: fadeUp 0.6s 0.3s ease both;
    }

    footer span { color: var(--text2); }

    /* Responsive */
    @media (max-width: 480px) {
      .input-row { flex-direction: column; }
      .search-btn { width: 100%; justify-content: center; }
      .result-header { flex-direction: column-reverse; }
      .pin-big { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<div class="page">

  <header>
    <div class="logo-pill">
      <div class="logo-dot"></div>
      India Postal Network
    </div>
    <h1>PIN Code <span>Finder</span></h1>
    <p class="subtitle">Instantly look up post office details for any<br>6-digit Indian PIN code</p>
  </header>

  <!-- Search -->
  <div class="search-card">
    <div class="input-label">Enter PIN Code</div>
    <div class="input-row">
      <input type="text" id="pincode" maxlength="6" placeholder="e.g. 641001"
        oninput="this.value=this.value.replace(/\D/g,'')"
        onkeydown="if(event.key==='Enter') findPincode()" />
      <button class="search-btn" onclick="findPincode()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        Search
      </button>
    </div>
    <div class="hint">Tip: Press Enter to search quickly</div>
  </div>

  <!-- Output -->
  <div id="output"></div>

  <footer>Powered by <span>postalpincode.in</span> · India Post Data</footer>

</div>

<script>
  async function findPincode() {
    const pin = document.getElementById('pincode').value.trim();
    const out = document.getElementById('output');

    if (pin.length !== 6) {
      out.innerHTML = `
        <div class="error-msg">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          Please enter a valid 6-digit PIN code.
        </div>`;
      return;
    }

    out.innerHTML = `
      <div class="loader">
        <div class="spin"></div>
        Looking up PIN ${pin}…
      </div>`;

    try {
      const res = await fetch(`https://api.postalpincode.in/pincode/${pin}`);
      const data = await res.json();

      if (data[0].Status !== 'Success' || !data[0].PostOffice?.length) {
        out.innerHTML = `
          <div class="error-msg">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
            No details found for PIN code ${pin}.
          </div>`;
        return;
      }

      const offices = data[0].PostOffice;
      const p = offices[0];
      const others = offices.slice(1);

      const fieldIcon = (emoji) => `<div class="field-icon">${emoji}</div>`;

      const fields = [
        { icon: '🏢', label: 'Post Office',   val: p.Name },
        { icon: '📍', label: 'District',       val: p.District || '—' },
        { icon: '🗺️', label: 'Division',       val: p.Division || '—' },
        { icon: '🏛️', label: 'Region',         val: p.Region || '—' },
        { icon: '🇮🇳', label: 'State',          val: p.State || '—' },
        { icon: '📦', label: 'Delivery',       val: p.DeliveryStatus || '—' },
      ];

      const fieldsHtml = fields.map(f => `
        <div class="field-row">
          <div class="field-key">${fieldIcon(f.icon)} ${f.label}</div>
          <div class="field-val">${f.val}</div>
        </div>`).join('');

      const otherHtml = others.length ? `
        <div class="more-section">
          <div class="more-title">Other post offices sharing this PIN (${others.length})</div>
          <div>
            ${others.slice(0, 10).map(o => `
              <span class="po-chip">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                ${o.Name}
              </span>`).join('')}
            ${others.length > 10 ? `<span class="po-chip">+${others.length - 10} more</span>` : ''}
          </div>
        </div>` : '';

      const deliveryBadge = p.DeliveryStatus === 'Delivery'
        ? `<span class="badge badge-delivery">✦ Delivery</span>`
        : '';

      out.innerHTML = `
        <div class="result-card">
          <div class="result-header">
            <div>
              <div class="po-name">${p.Name}</div>
              <div class="badges">
                <span class="badge badge-pin">${pin}</span>
                ${p.BranchType ? `<span class="badge badge-type">${p.BranchType}</span>` : ''}
                ${deliveryBadge}
              </div>
            </div>
            <div class="pin-big">${pin}</div>
          </div>
          <div class="fields">${fieldsHtml}</div>
          ${otherHtml}
        </div>`;

    } catch (e) {
      out.innerHTML = `
        <div class="error-msg">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          Network error. Please check your connection and try again.
        </div>`;
    }
  }
</script>

</body>
</html>
